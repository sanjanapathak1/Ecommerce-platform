<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlizoneX - Login | SignUp</title>
  <link rel="stylesheet" href="signup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- Background Image -->
    <div class="bg-image"></div>
    
    <!-- White Overlay -->
    <div class="overlay"></div>

    <!-- Outer Modal Container -->
    <div class="modal-wrapper">
      <!-- Top Header -->
      <div class="modal-header">
        <div class="logo">
          <span class="logo-alizone">ALIZONE</span>
          <span class="logo-x">X</span>
        </div>
        <div class="login-signup-text">
          Login | SignUp
        </div>
      </div>

      <!-- Inner Content Wrapper -->
      <div class="modal-content">
        <!-- The White Form Card -->
        <div class="form-card">
          <!-- Tabs -->
          <div class="tabs">
            <button class="tab active">Login</button>
            <button class="tab">Sign Up</button>
          </div>

          <!-- Form Fields -->
          <div class="form-fields">
            <!-- Phone/Email Field -->
            <div class="input-group">
              <label>Phone/Email</label>
              <div class="input-with-prefix">
                <div class="country-selector">
                  <svg width="24" height="16" viewBox="0 0 60 40" class="flag-icon">
                    <rect width="60" height="40" fill="#fff"/>
                    <rect width="60" height="20" fill="#bf0a30"/>
                    <rect y="8" width="60" height="8" fill="#fff"/>
                    <rect y="16" width="60" height="8" fill="#bf0a30"/>
                    <rect y="24" width="60" height="8" fill="#fff"/>
                    <rect y="32" width="60" height="8" fill="#bf0a30"/>
                    <rect width="24" height="21.33" fill="#002868"/>
                  </svg>
                  <svg class="chevron-down" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                  <span class="country-code">+1</span>
                </div>
                <input type="text" class="input-field" placeholder="">
              </div>
            </div>

            <!-- OTP/Password Field -->
            <div class="input-group">
              <label>OTP/Password</label>
              <div class="input-with-prefix">
                <div class="lock-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                  </svg>
                </div>
                <input type="password" class="input-field password-field" value="1234567" placeholder="•••••••">
                <button class="forgot-btn">Forgot ?</button>
              </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
              <button class="btn-login">Login</button>
              <button class="btn-signup" onclick="window.location.href='KYC.html'" >Sign Up</button>
            </div>

            <!-- Divider -->
            <div class="divider">
              <span class="divider-line"></span>
              <span class="divider-text">OR</span>
              <span class="divider-line"></span>
            </div>

            <!-- Social Login -->
            <div class="social-buttons">
              <button class="social-btn facebook">
                <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
              </button>
              <button class="social-btn google">
                <svg class="social-icon" viewBox="0 0 24 24">
                  <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                  <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                  <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                  <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Footer -->
          <div class="form-footer">
            <p>New to AlizoneX ? <span class="signup-link">Sign UP</span></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
